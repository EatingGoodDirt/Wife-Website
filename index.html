```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Shaa ❤️</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  overflow:hidden;
  font-family:Arial,sans-serif;
  color:white;
  background:linear-gradient(120deg,#080018,#24104f,#6025a8,#ff4d8d,#ffb703,#3a86ff,#00f5d4);
  background-size:900% 900%;
  animation:bg 12s infinite alternate ease-in-out;
  display:flex;
  justify-content:center;
  align-items:center;
}
@keyframes bg{from{background-position:0% 50%}to{background-position:100% 50%}}

.window{
  position:fixed;
  top:5%;
  left:8%;
  width:84%;
  height:58%;
  border:10px solid rgba(30,15,45,.8);
  border-radius:30px;
  background:radial-gradient(circle at 40% 40%,#4b1d95,#090018 70%);
  box-shadow:inset 0 0 80px black,0 0 60px rgba(255,255,255,.3);
  overflow:hidden;
  z-index:1;
}

.floor{
  position:fixed;
  bottom:0;
  width:100%;
  height:35%;
  background:linear-gradient(#2a123b,#11051d);
  z-index:1;
}

.table{
  position:fixed;
  bottom:11%;
  width:75%;
  height:75px;
  border-radius:50%;
  background:linear-gradient(90deg,#3b1f13,#8a4f2a,#3b1f13);
  z-index:2;
}

.coffee{
  position:fixed;
  right:17%;
  bottom:18%;
  font-size:58px;
  z-index:3;
  animation:float 3s infinite ease-in-out;
}

.steam{
  position:fixed;
  right:20%;
  bottom:28%;
  font-size:30px;
  z-index:3;
  animation:steam 2s infinite ease-in-out;
}
@keyframes steam{from{transform:translateY(20px);opacity:.2}to{transform:translateY(-35px);opacity:.8}}

.card{
  position:relative;
  z-index:10;
  width:92%;
  max-width:620px;
  padding:30px;
  border-radius:32px;
  text-align:center;
  background:rgba(255,255,255,.16);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.35);
  box-shadow:0 0 90px rgba(255,255,255,.35);
  animation:float 4s infinite ease-in-out;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

h1{font-size:40px;text-shadow:0 0 25px white;margin:0 0 12px}
p{font-size:20px}

button,a{
  margin:9px;
  padding:14px 24px;
  border:none;
  border-radius:999px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
  transition:.2s;
}
button:hover,a:hover{transform:scale(1.08)}

#meBtn,#noseMe,#kissBtn{
  background:white;
  color:#9b0063;
  box-shadow:0 0 25px white;
}
#youBtn,#noseYou{background:#111;color:white}
.music{display:inline-block;background:white;color:#3c096c}

#message{font-size:34px;text-shadow:0 0 30px white}
#subMessage{font-size:22px;opacity:0}
#question2{display:none;margin-top:22px}
#bigNose{display:none;font-size:45px;transition:.25s}

.bottom-love{
  position:fixed;
  bottom:15px;
  width:100%;
  text-align:center;
  font-size:23px;
  font-weight:bold;
  z-index:20;
  text-shadow:0 0 25px white;
}

.cat,.planet,.particle,.shooting-star,.asteroid{
  position:fixed;
  pointer-events:none;
}

.cat{
  z-index:4;
  font-size:64px;
  filter:drop-shadow(0 0 15px white);
}
.cat1{top:12%;left:-220px;animation:catfly 11s linear infinite}
.cat2{top:43%;left:-260px;animation:catfly 16s linear infinite 3s}
.cat3{top:72%;left:-280px;animation:catfly 20s linear infinite 6s}

@keyframes catfly{
  from{transform:translateX(-260px) rotate(-15deg)}
  to{transform:translateX(125vw) rotate(25deg)}
}

.planet{
  z-index:2;
  font-size:70px;
  animation:float 6s infinite ease-in-out;
}
.p1{top:9%;right:10%}
.p2{bottom:24%;left:7%}

.shooting-star{
  z-index:3;
  width:190px;
  height:3px;
  background:linear-gradient(90deg,white,transparent);
  box-shadow:0 0 18px white;
  animation:shoot 1.3s linear forwards;
}
@keyframes shoot{
  from{transform:translate(-250px,-120px) rotate(-25deg);opacity:1}
  to{transform:translate(135vw,95vh) rotate(-25deg);opacity:0}
}

.asteroid{
  z-index:3;
  font-size:42px;
  animation:asteroidFly linear forwards;
}
@keyframes asteroidFly{
  from{transform:translate(-120px,-80px) rotate(0deg);opacity:1}
  to{transform:translate(130vw,100vh) rotate(900deg);opacity:0}
}

.particle{
  z-index:30;
  animation:fly 3s linear forwards;
}
@keyframes fly{
  from{transform:translate(0,0) scale(1);opacity:1}
  to{transform:translate(var(--x),var(--y)) scale(0);opacity:0}
}

.rainbow{
  animation:bg 2s infinite alternate ease-in-out,rainbow 1s infinite;
}
@keyframes rainbow{
  from{filter:hue-rotate(0deg) brightness(1.2)}
  to{filter:hue-rotate(360deg) brightness(1.7)}
}
</style>
</head>

<body>

<div class="window"></div>
<div class="floor"></div>
<div class="table"></div>
<div class="coffee">☕</div>
<div class="steam">〰️</div>

<div class="planet p1">🪐</div>
<div class="planet p2">🌙</div>

<div class="cat cat1">🐈☄️</div>
<div class="cat cat2">🐈‍⬛🚀</div>
<div class="cat cat3">😻🛸</div>

<div class="card" id="card">
  <h1>❤️ Very Important Question ❤️</h1>
  <p>Who's the bigger slut? 😏</p>

  <button id="meBtn" onclick="celebrate()">Me 🙋‍♂️</button>
  <button id="youBtn" onmouseover="moveButton()" onclick="moveButton()">You 😇</button>

  <h2 id="message"></h2>
  <p id="subMessage"></p>

  <div id="question2">
    <h2>Second Important Question 👃</h2>
    <p>Who has the bigger nose?</p>
    <button id="noseMe" onclick="growNose()">Me 👃</button>
    <button id="noseYou" onclick="buttercup()">You 😇</button>
    <div id="bigNose">👃</div>
    <p id="noseMsg"></p>
  </div>

  <a class="music" href="https://www.youtube.com/watch?v=f0pdwd0miqs&list=RDf0pdwd0miqs&start_radio=1" target="_blank">
    🎵 Play the vibe
  </a>
</div>

<div class="bottom-love">I love you Shaa ❤️</div>

<script>
let noseSize = 45;

function moveButton(){
  const btn=document.getElementById("youBtn");
  btn.style.position="fixed";
  btn.style.left=Math.random()*75+"vw";
  btn.style.top=Math.random()*75+"vh";
}

function makeParticle(symbol){
  const p=document.createElement("div");
  p.className="particle";
  p.innerHTML=symbol;
  p.style.left="50vw";
  p.style.top="50vh";
  p.style.fontSize=Math.random()*34+20+"px";
  p.style.setProperty("--x",(Math.random()*1000-500)+"px");
  p.style.setProperty("--y",(Math.random()*1000-500)+"px");
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),3000);
}

function rain(symbol,count){
  for(let i=0;i<count;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.innerHTML=symbol;
    p.style.left=Math.random()*100+"vw";
    p.style.top="-40px";
    p.style.fontSize=Math.random()*25+22+"px";
    p.style.setProperty("--x",(Math.random()*200-100)+"px");
    p.style.setProperty("--y","110vh");
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),3000);
  }
}

function celebrate(){
  document.body.classList.add("rainbow");
  document.getElementById("message").innerHTML="I LOVE YOU ❤️";
  document.getElementById("subMessage").innerHTML="you adorable little slut 😂💕";
  document.getElementById("subMessage").style.opacity="1";
  document.getElementById("question2").style.display="block";

  const symbols=["❤️","💕","💖","✨","⭐","🌙","💋","🎆","💫","🌈","🔥","🪐","🐈","😻","☄️","🚀"];
  for(let i=0;i<360;i++){
    setTimeout(()=>makeParticle(symbols[Math.floor(Math.random()*symbols.length)]),i*5);
  }

  if(!document.getElementById("kissBtn")){
    setTimeout(()=>{
      const kissBtn=document.createElement("button");
      kissBtn.id="kissBtn";
      kissBtn.innerHTML="One more kiss 💋";
      kissBtn.onclick=()=>{for(let i=0;i<180;i++)makeParticle("💋")};
      document.getElementById("card").appendChild(kissBtn);
    },1000);
  }
}

function buttercup(){
  document.getElementById("noseMsg").innerHTML="Try again buttercup 😂🥜🍫";
  rain("🥜",70);
  rain("🍫",70);
}

function growNose(){
  const nose=document.getElementById("bigNose");
  nose.style.display="block";
  noseSize+=45;
  nose.style.fontSize=noseSize+"px";
  document.getElementById("noseMsg").innerHTML="bro that's actually crazy 😭😂";
  for(let i=0;i<80;i++)makeParticle("👃");
}

function shootingStar(){
  const s=document.createElement("div");
  s.className="shooting-star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*65+"vh";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),1500);
}

function asteroid(){
  const a=document.createElement("div");
  a.className="asteroid";
  const rocks=["☄️","🪨","🔥","💫"];
  a.innerHTML=rocks[Math.floor(Math.random()*rocks.length)];
  a.style.left=Math.random()*25+"vw";
  a.style.top=Math.random()*45+"vh";
  a.style.animationDuration=Math.random()*3+3+"s";
  document.body.appendChild(a);
  setTimeout(()=>a.remove(),7000);
}

setInterval(shootingStar,450);
setInterval(asteroid,650);
</script>

</body>
</html>
