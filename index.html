<body>
<div class="bg"></div><div class="glow"></div><div class="steam"><span></span><span></span><span></span></div>
<div class="card" id="card">
  <h1>❤️ Very Important Question ❤️</h1>

  <button id="meBtn" onclick="celebrate()">Me 🙋‍♂️</button>
  <button id="youBtn" onmouseover="moveButton()" onclick="moveButton()">You 😇</button>

  <div id="question2"><h2>Second Important Question 👃</h2><p>Who has the bigger nose?</p><button id="noseMe" onclick="growNose()">Me 👃</button><button id="noseYou" onclick="buttercup()">You 😇</button><div id="bigNose">👃</div><p id="noseMsg"></p></div>
  <a class="music" href="https://www.youtube.com/watch?v=f0pdwd0miqs&list=RDf0pdwd0miqs&start_radio=1" target="_blank">🎵 Our song</a>
</div>
<div class="bottom-love">I love you Shaa ❤️</div>
<div class="secret" id="secret"><div>Out of every person in the universe,<br>I would still choose you every single time. ❤️<br><br>I love you Shaa.</div></div>
<script>
let noseSize=45;let sCount=0;
function moveButton(){const btn=document.getElementById("youBtn");btn.style.position="fixed";btn.style.left=Math.random()*75+"vw";btn.style.top=Math.random()*75+"vh";}
function makeParticle(symbol,x="50vw",y="50vh"){const p=document.createElement("div");p.className="particle";p.innerHTML=symbol;p.style.left=x;p.style.top=y;p.style.fontSize=Math.random()*34+20+"px";p.style.setProperty("--x",(Math.random()*1000-500)+"px");p.style.setProperty("--y",(Math.random()*1000-500)+"px");document.body.appendChild(p);setTimeout(()=>p.remove(),3000);}
function rain(symbol,count){for(let i=0;i<count;i++){const p=document.createElement("div");p.className="particle";p.innerHTML=symbol;p.style.left=Math.random()*100+"vw";p.style.top="-40px";p.style.fontSize=Math.random()*25+22+"px";p.style.setProperty("--x",(Math.random()*200-100)+"px");p.style.setProperty("--y","110vh");document.body.appendChild(p);setTimeout(()=>p.remove(),3000);}}
function celebrate(){document.body.classList.add("rainbow");document.getElementById("message").innerHTML="I LOVE YOU ❤️";document.getElementById("subMessage").innerHTML="you adorable little slut 😂💕";document.getElementById("subMessage").style.opacity="1";document.getElementById("question2").style.display="block";const symbols=["❤️","💕","💖","✨","⭐","🌙","💋","🎆","💫","🌈","🔥","🪐","🐈","😻","☄️","🚀","🛸","☕"];for(let i=0;i<430;i++){setTimeout(()=>makeParticle(symbols[Math.floor(Math.random()*symbols.length)]),i*4);}if(!document.getElementById("kissBtn")){setTimeout(()=>{const kissBtn=document.createElement("button");kissBtn.id="kissBtn";kissBtn.innerHTML="One more kiss 💋";kissBtn.onclick=()=>{for(let i=0;i<240;i++){makeParticle("💋");if(i%3===0)makeParticle("❤️");if(i%5===0)makeParticle("✨");}};document.getElementById("card").appendChild(kissBtn);},1000);}}
function buttercup(){document.getElementById("noseMsg").innerHTML="Try again buttercup 😂🥜🍫";rain("🥜",100);rain("🍫",100);}
function growNose(){const nose=document.getElementById("bigNose");nose.style.display="block";noseSize+=48;nose.style.fontSize=noseSize+"px";document.getElementById("noseMsg").innerHTML="bro that's actually crazy 😭😂";for(let i=0;i<115;i++)makeParticle("👃");}
function shootingStar(){const s=document.createElement("div");s.className="shooting-star";s.style.left=Math.random()*100+"vw";s.style.top=Math.random()*65+"vh";document.body.appendChild(s);setTimeout(()=>s.remove(),1400);}
function asteroid(){const a=document.createElement("div");a.className="asteroid";a.style.left=Math.random()*25+"vw";a.style.top=Math.random()*45+"vh";a.style.animationDuration=Math.random()*3+3+"s";document.body.appendChild(a);setTimeout(()=>a.remove(),7000);}
function floatingHeart(){const h=document.createElement("div");h.className="heartFloat";h.innerHTML=Math.random()>.5?"❤️":"💕";h.style.left=Math.random()*100+"vw";h.style.bottom="-30px";h.style.fontSize=Math.random()*18+16+"px";document.body.appendChild(h);setTimeout(()=>h.remove(),7000);}
function rainDrop(){const r=document.createElement("div");r.className="rainDrop";r.style.left=Math.random()*100+"vw";r.style.top="-30px";document.body.appendChild(r);setTimeout(()=>r.remove(),1700);}
function musicNote(){const n=document.createElement("div");n.className="musicNote";n.innerHTML=Math.random()>.5?"♪":"♫";n.style.left=Math.random()*100+"vw";n.style.bottom="12vh";document.body.appendChild(n);setTimeout(()=>n.remove(),7000);}
function flyingCat(){const c=document.createElement("div");c.className="spaceCat";const cats=["🐈☄️","🐈‍⬛🚀","😻🛸","🐱✨"];c.innerHTML=cats[Math.floor(Math.random()*cats.length)];c.style.left="-120px";c.style.top=Math.random()*75+"vh";c.style.animationDuration=(Math.random()*8+10)+"s";document.body.appendChild(c);setTimeout(()=>c.remove(),19000);}
document.addEventListener("mousemove",e=>{if(Math.random()>.72){makeParticle("✨",e.clientX+"px",e.clientY+"px");}});
document.addEventListener("keydown",e=>{if(e.key.toLowerCase()==="s"){sCount++;if(sCount>=5){document.getElementById("secret").style.display="flex";for(let i=0;i<280;i++){setTimeout(()=>makeParticle("❤️"),i*4);}}}else{sCount=0;}});
setInterval(shootingStar,380);setInterval(asteroid,560);setInterval(floatingHeart,950);setInterval(rainDrop,80);setInterval(musicNote,1700);setInterval(flyingCat,4500);
</script>
</body>
</html>
