<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For Shaa ❤️</title>

<style>
*{box-sizing:border-box}
:root{
  --pink:#ff5fa2;
  --hot:#ff2f8f;
  --purple:#8a4dff;
  --blue:#63e6ff;
  --gold:#ffd166;
  --ink:#090014;
}
html,body{height:100%}
body{
  margin:0;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  background:#070011;
}

/* ===== TEXT-FREE ANIME LOFI CAFE BACKGROUND ===== */
.sky{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 25% 25%, rgba(255,90,180,.40), transparent 22%),
    radial-gradient(circle at 74% 28%, rgba(99,230,255,.25), transparent 28%),
    radial-gradient(circle at 50% 52%, rgba(136,77,255,.35), transparent 35%),
    linear-gradient(145deg,#04000d,#15002f,#29105d,#5c2498,#d9469a,#2975ff);
  background-size:240% 240%;
  animation:skyMove 18s ease-in-out infinite alternate;
}
@keyframes skyMove{
  from{background-position:0% 45%}
  to{background-position:100% 70%}
}

.window{
  position:fixed;
  top:4vh;
  left:5vw;
  width:90vw;
  height:60vh;
  border-radius:38px;
  border:14px solid rgba(22,9,38,.94);
  background:
    radial-gradient(circle at 22% 35%,rgba(255,95,180,.25),transparent 22%),
    radial-gradient(circle at 78% 31%,rgba(99,230,255,.18),transparent 27%),
    radial-gradient(circle at 52% 50%,rgba(255,255,255,.06),transparent 18%),
    radial-gradient(circle at 50% 48%,#3c247f,#080016 74%);
  box-shadow:
    inset 0 0 90px rgba(0,0,0,.95),
    0 0 80px rgba(255,180,230,.20);
  overflow:hidden;
}
.window::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg,transparent 49.7%,rgba(255,255,255,.10) 50%,transparent 50.3%),
    linear-gradient(transparent 49.7%,rgba(255,255,255,.08) 50%,transparent 50.3%);
}
.window::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 50% 20%,rgba(255,255,255,.14),transparent 55%);
}

.city{
  position:fixed;
  bottom:37vh;
  left:7vw;
  width:86vw;
  height:105px;
  opacity:.74;
  background:
    linear-gradient(to top,rgba(0,0,0,.85),transparent),
    repeating-linear-gradient(90deg,rgba(8,3,25,.96) 0 50px,rgba(23,8,52,.96) 50px 84px);
  clip-path:polygon(0 100%,0 42%,5% 42%,5% 16%,11% 16%,11% 67%,19% 67%,19% 30%,29% 30%,29% 60%,41% 60%,41% 12%,52% 12%,52% 72%,66% 72%,66% 35%,76% 35%,76% 52%,88% 52%,88% 20%,100% 20%,100% 100%);
}

.floor{
  position:fixed;
  bottom:0;
  width:100%;
  height:38vh;
  background:
    linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px),
    linear-gradient(#2a143c,#16071f 55%,#090010);
  background-size:80px 80px,100% 100%;
}
.table{
  position:fixed;
  bottom:6vh;
  left:50%;
  transform:translateX(-50%);
  width:92vw;
  height:130px;
  border-radius:50%;
  background:
    radial-gradient(ellipse at center,#b9743f,#7a421f 56%,#2c1308);
  box-shadow:0 42px 75px rgba(0,0,0,.68),0 0 45px rgba(255,195,120,.18);
}
.lampCord{
  position:fixed;
  top:0;
  left:17vw;
  width:4px;
  height:20vh;
  background:rgba(255,255,255,.18);
}
.lampCord::after{
  content:"";
  position:absolute;
  bottom:-34px;
  left:-43px;
  width:88px;
  height:48px;
  border-radius:50%;
  background:radial-gradient(circle,#fff8cf,#ff9bd2 58%,transparent 72%);
  box-shadow:0 0 60px #ff9bd2;
}
.plants{
  position:fixed;
  inset:0;
  pointer-events:none;
}
.plants::before{
  content:"";
  position:absolute;
  top:-20px;
  left:33vw;
  width:110px;
  height:190px;
  background:
    radial-gradient(ellipse at 35% 15%,#245c34 0 18px,transparent 19px),
    radial-gradient(ellipse at 60% 30%,#1d4a2b 0 20px,transparent 21px),
    radial-gradient(ellipse at 40% 50%,#245c34 0 18px,transparent 19px),
    radial-gradient(ellipse at 63% 70%,#173d24 0 20px,transparent 21px);
  opacity:.65;
  animation:plantSway 6s ease-in-out infinite alternate;
}
.plants::after{
  content:"";
  position:absolute;
  top:-10px;
  right:9vw;
  width:120px;
  height:240px;
  background:
    radial-gradient(ellipse at 30% 20%,#245c34 0 18px,transparent 19px),
    radial-gradient(ellipse at 70% 35%,#1d4a2b 0 22px,transparent 23px),
    radial-gradient(ellipse at 40% 55%,#245c34 0 20px,transparent 21px),
    radial-gradient(ellipse at 65% 77%,#173d24 0 20px,transparent 21px);
  opacity:.55;
  animation:plantSway 7s ease-in-out infinite alternate-reverse;
}
@keyframes plantSway{
  from{transform:rotate(-2deg)}
  to{transform:rotate(3deg)}
}

/* foreground coffee, steam */
.mug{
  position:fixed;
  right:10vw;
  bottom:9vh;
  width:92px;
  height:70px;
  border-radius:0 0 26px 26px;
  background:linear-gradient(#fff,#ffd6e8);
  box-shadow:0 0 35px rgba(255,255,255,.8);
}
.mug::before{
  content:"";
  position:absolute;
  left:14px;
  top:9px;
  width:64px;
  height:12px;
  border-radius:50%;
  background:#5b2b1a;
  opacity:.75;
}
.mug::after{
  content:"";
  position:absolute;
  right:-31px;
  top:12px;
  width:36px;
  height:36px;
  border:8px solid #ffd6e8;
  border-left:none;
  border-radius:50%;
}
.steam{
  position:fixed;
  right:12vw;
  bottom:17vh;
  width:90px;
  height:150px;
  pointer-events:none;
}
.steam span{
  position:absolute;
  bottom:0;
  width:18px;
  height:80px;
  border-radius:50%;
  border-left:3px solid rgba(255,255,255,.72);
  animation:steamRise 3.2s ease-in-out infinite;
}
.steam span:nth-child(1){left:10px;animation-delay:0s}
.steam span:nth-child(2){left:38px;animation-delay:.7s}
.steam span:nth-child(3){left:66px;animation-delay:1.4s}
@keyframes steamRise{
  0%{transform:translateY(26px) scale(.8);opacity:0}
  35%{opacity:.75}
  100%{transform:translateY(-66px) scale(1.35);opacity:0}
}

/* ===== INTERACTIVE NOTE CARD ON TABLE ===== */
.card{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-48%);
  z-index:20;
  width:min(92vw,560px);
  padding:28px 26px;
  border-radius:30px;
  text-align:center;
  background:rgba(15,7,28,.58);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,190,230,.46);
  box-shadow:
    0 0 60px rgba(255,95,162,.34),
    inset 0 0 35px rgba(255,255,255,.07);
  animation:cardFloat 4.5s ease-in-out infinite;
}
@keyframes cardFloat{
  0%,100%{transform:translate(-50%,-48%)}
  50%{transform:translate(-50%,-50%)}
}
h1{
  margin:0 0 16px;
  font-size:36px;
  text-shadow:0 0 24px white,0 0 40px var(--pink);
}
p{
  margin:12px 0;
  font-size:20px;
}
button,a{
  margin:9px;
  padding:14px 24px;
  border:none;
  border-radius:999px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
  transition:.2s;
}
button:hover,a:hover{transform:scale(1.08)}
#meBtn,#noseMe,#kissBtn{
  background:linear-gradient(135deg,#fff,#ffd6e8);
  color:#9b0063;
  box-shadow:0 0 25px rgba(255,255,255,.85);
}
#youBtn,#noseYou{
  background:rgba(10,5,18,.86);
  color:white;
  border:1px solid rgba(255,190,230,.45);
}
.music{
  display:inline-block;
  background:linear-gradient(135deg,#fff,#ead8ff);
  color:#3c096c;
}
#message{
  font-size:32px;
  text-shadow:0 0 30px white,0 0 45px var(--pink);
}
#subMessage{
  font-size:21px;
  opacity:0;
  transition:.8s;
}
#question2{
  display:none;
  margin-top:20px;
  padding-top:10px;
  border-top:1px solid rgba(255,255,255,.22);
}
#bigNose{
  display:none;
  font-size:45px;
  transition:.25s;
}
#noseMsg{min-height:30px}
.bottom-love{
  position:fixed;
  bottom:14px;
  width:100%;
  text-align:center;
  font-size:23px;
  font-weight:bold;
  z-index:35;
  text-shadow:0 0 25px white,0 0 45px var(--pink);
  pointer-events:none;
}

/* moving life */
.particle,.shooting-star,.asteroid,.heartFloat,.spaceCat,.musicNote,.rainDrop{
  position:fixed;
  pointer-events:none;
}
.shooting-star{
  z-index:6;
  width:190px;
  height:3px;
  background:linear-gradient(90deg,white,transparent);
  box-shadow:0 0 18px white;
  animation:shoot 1.2s linear forwards;
}
@keyframes shoot{
  from{transform:translate(-250px,-120px) rotate(-25deg);opacity:1}
  to{transform:translate(135vw,95vh) rotate(-25deg);opacity:0}
}
.asteroid{
  z-index:6;
  width:42px;
  height:42px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#eee,#7a4b25 45%,#241006 85%);
  box-shadow:0 0 18px var(--gold);
  animation:asteroidFly linear forwards;
}
@keyframes asteroidFly{
  from{transform:translate(-120px,-80px) rotate(0deg);opacity:1}
  to{transform:translate(130vw,100vh) rotate(900deg);opacity:0}
}
.spaceCat{
  z-index:8;
  font-size:46px;
  filter:drop-shadow(0 0 14px white);
  animation:catFloat linear forwards;
}
@keyframes catFloat{
  from{transform:translateX(-120px) translateY(0) rotate(-8deg);opacity:1}
  to{transform:translateX(120vw) translateY(-40px) rotate(16deg);opacity:0}
}
.particle{
  z-index:45;
  animation:fly 3s linear forwards;
}
@keyframes fly{
  from{transform:translate(0,0) scale(1);opacity:1}
  to{transform:translate(var(--x),var(--y)) scale(0);opacity:0}
}
.heartFloat{
  z-index:9;
  font-size:22px;
  opacity:.75;
  animation:heartRise 7s linear forwards;
}
@keyframes heartRise{
  0%{transform:translateY(0);opacity:.1}
  20%{opacity:.8}
  100%{transform:translateY(-110vh);opacity:0}
}
.rainDrop{
  z-index:4;
  width:2px;
  height:22px;
  background:linear-gradient(transparent,rgba(255,255,255,.50));
  animation:rainFall 1.7s linear forwards;
}
@keyframes rainFall{
  from{transform:translateY(-40px);opacity:.1}
  to{transform:translateY(110vh);opacity:.55}
}
.musicNote{
  z-index:9;
  font-size:22px;
  opacity:.8;
  animation:noteFloat 7s linear forwards;
}
@keyframes noteFloat{
  0%{transform:translateY(0) rotate(0);opacity:0}
  20%{opacity:.8}
  100%{transform:translateY(-70vh) rotate(30deg);opacity:0}
}
.rainbow{animation:rainbow 1s infinite}
@keyframes rainbow{
  from{filter:hue-rotate(0deg) brightness(1.08)}
  to{filter:hue-rotate(360deg) brightness(1.22)}
}
.secret{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.86);
  z-index:100;
  display:none;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:30px;
}
.secret div{
  max-width:700px;
  font-size:30px;
  line-height:1.35;
  text-shadow:0 0 30px #fff;
}
@media(max-width:600px){
  .card{padding:22px 18px;top:48%;width:90vw}
  h1{font-size:30px}
  p{font-size:18px}
  .mug{right:5vw;bottom:7vh;transform:scale(.82)}
  .steam{right:8vw;bottom:14vh;transform:scale(.82)}
}
</style>
</head>

<body>
<div class="sky"></div>
<div class="window"></div>
<div class="city"></div>
<div class="floor"></div>
<div class="table"></div>
<div class="lampCord"></div>
<div class="plants"></div>
<div class="mug"></div>
<div class="steam"><span></span><span></span><span></span></div>

<div class="card" id="card">
  <h1>❤️ Very Important Question ❤️</h1>
  <p><b>Who's the bigger slut? 😏</b></p>

  <button id="meBtn" onclick="celebrate()">Me 🙋‍♂️</button>
  <button id="youBtn" onmouseover="moveButton()" onclick="moveButton()">You 😇</button>

  <h2 id="message"></h2>
  <p id="subMessage"></p>

  <div id="question2">
    <h2>Second Important Question 👃</h2>
    <p>Who has the bigger nose?</p>
    <button id="noseMe" onclick="growNose()">Me 👃</button>
    <button id="noseYou" onclick="buttercup()">You 😇</button>
    <div id="bigNose">👃</div>
    <p id="noseMsg"></p>
  </div>

  <a class="music" href="https://www.youtube.com/watch?v=f0pdwd0miqs&list=RDf0pdwd0miqs&start_radio=1" target="_blank">🎵 Our song</a>
</div>

<div class="bottom-love">I love you Shaa ❤️</div>

<div class="secret" id="secret">
  <div>
    Out of every person in the universe,<br>
    I would still choose you every single time. ❤️<br><br>
    I love you Shaa.
  </div>
</div>

<script>
let noseSize = 45;
let sCount = 0;

function moveButton(){
  const btn=document.getElementById("youBtn");
  btn.style.position="fixed";
  btn.style.left=Math.random()*75+"vw";
  btn.style.top=Math.random()*75+"vh";
}

function makeParticle(symbol,x="50vw",y="50vh"){
  const p=document.createElement("div");
  p.className="particle";
  p.innerHTML=symbol;
  p.style.left=x;
  p.style.top=y;
  p.style.fontSize=Math.random()*34+20+"px";
  p.style.setProperty("--x",(Math.random()*1000-500)+"px");
  p.style.setProperty("--y",(Math.random()*1000-500)+"px");
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),3000);
}

function rain(symbol,count){
  for(let i=0;i<count;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.innerHTML=symbol;
    p.style.left=Math.random()*100+"vw";
    p.style.top="-40px";
    p.style.fontSize=Math.random()*25+22+"px";
    p.style.setProperty("--x",(Math.random()*200-100)+"px");
    p.style.setProperty("--y","110vh");
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),3000);
  }
}

function celebrate(){
  document.body.classList.add("rainbow");
  document.getElementById("message").innerHTML="I LOVE YOU ❤️";
  document.getElementById("subMessage").innerHTML="you adorable little slut 😂💕";
  document.getElementById("subMessage").style.opacity="1";
  document.getElementById("question2").style.display="block";

  const symbols=["❤️","💕","💖","✨","⭐","🌙","💋","🎆","💫","🌈","🔥","🪐","🐈","😻","☄️","🚀","🛸","☕"];
  for(let i=0;i<430;i++){
    setTimeout(()=>makeParticle(symbols[Math.floor(Math.random()*symbols.length)]),i*4);
  }

  if(!document.getElementById("kissBtn")){
    setTimeout(()=>{
      const kissBtn=document.createElement("button");
      kissBtn.id="kissBtn";
      kissBtn.innerHTML="One more kiss 💋";
      kissBtn.onclick=()=>{
        for(let i=0;i<240;i++){
          makeParticle("💋");
          if(i%3===0)makeParticle("❤️");
          if(i%5===0)makeParticle("✨");
        }
      };
      document.getElementById("card").appendChild(kissBtn);
    },1000);
  }
}

function buttercup(){
  document.getElementById("noseMsg").innerHTML="Try again buttercup 😂🥜🍫";
  rain("🥜",100);
  rain("🍫",100);
}

function growNose(){
  const nose=document.getElementById("bigNose");
  nose.style.display="block";
  noseSize+=48;
  nose.style.fontSize=noseSize+"px";
  document.getElementById("noseMsg").innerHTML="bro that's actually crazy 😭😂";
  for(let i=0;i<115;i++)makeParticle("👃");
}

function shootingStar(){
  const s=document.createElement("div");
  s.className="shooting-star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*65+"vh";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),1400);
}

function asteroid(){
  const a=document.createElement("div");
  a.className="asteroid";
  a.style.left=Math.random()*25+"vw";
  a.style.top=Math.random()*45+"vh";
  a.style.animationDuration=Math.random()*3+3+"s";
  document.body.appendChild(a);
  setTimeout(()=>a.remove(),7000);
}

function floatingHeart(){
  const h=document.createElement("div");
  h.className="heartFloat";
  h.innerHTML=Math.random()>.5?"❤️":"💕";
  h.style.left=Math.random()*100+"vw";
  h.style.bottom="-30px";
  h.style.fontSize=Math.random()*18+16+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),7000);
}

function rainDrop(){
  const r=document.createElement("div");
  r.className="rainDrop";
  r.style.left=Math.random()*100+"vw";
  r.style.top="-30px";
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),1700);
}

function musicNote(){
  const n=document.createElement("div");
  n.className="musicNote";
  n.innerHTML=Math.random()>.5?"♪":"♫";
  n.style.left=Math.random()*100+"vw";
  n.style.bottom="12vh";
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),7000);
}

function flyingCat(){
  const c=document.createElement("div");
  c.className="spaceCat";
  const cats=["🐈☄️","🐈‍⬛🚀","😻🛸","🐱✨"];
  c.innerHTML=cats[Math.floor(Math.random()*cats.length)];
  c.style.left="-120px";
  c.style.top=Math.random()*75+"vh";
  c.style.animationDuration=Math.random()*8+10+"s";
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),19000);
}

document.addEventListener("mousemove",e=>{
  if(Math.random()>.72){
    makeParticle("✨",e.clientX+"px",e.clientY+"px");
  }
});

document.addEventListener("keydown",e=>{
  if(e.key.toLowerCase()==="s"){
    sCount++;
    if(sCount>=5){
      document.getElementById("secret").style.display="flex";
      for(let i=0;i<280;i++){
        setTimeout(()=>makeParticle("❤️"),i*4);
      }
    }
  }else{
    sCount=0;
  }
});

setInterval(shootingStar,380);
setInterval(asteroid,560);
setInterval(floatingHeart,950);
setInterval(rainDrop,80);
setInterval(musicNote,1700);
setInterval(flyingCat,4500);
</script>
</body>
</html>
